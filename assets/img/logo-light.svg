  <!-- Sparkles -->
  <path class="icon-secondary" d="M 115 25 Q 120 40 135 45 Q 120 50 115 65 Q 110 50 95 45 Q 110 40 115 25 Z" />
  <path class="icon-secondary" d="M 35 40 Q 38 50 48 53 Q 38 56 35 66 Q 32 56 22 53 Q 32 50 35 40 Z" />

  <!-- Text -->
