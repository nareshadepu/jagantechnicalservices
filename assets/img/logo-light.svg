<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&amp;display=swap');
      .text-primary { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 68px; fill: #ffffff; letter-spacing: 1px; }
      .text-secondary { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 20px; fill: #ffffff; letter-spacing: 5px; }
      .icon-primary { fill: #ffffff; }
      .icon-secondary { fill: #ffb400; }
    </style>
  </defs>

  <!-- Water Drop with Cutout -->
  <path class="icon-primary" fill-rule="evenodd" d="M 75 15 C 75 15, 30 75, 30 100 A 45 45 0 0 0 120 100 C 120 75, 75 15, 75 15 Z M 75 35 C 75 35, 105 80, 105 100 A 30 30 0 0 1 45 100 C 45 80, 75 35, 75 35 Z" />
  
  <!-- Inner Drop -->
